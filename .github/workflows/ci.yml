name: CI

on:
  push:
  pull_request:

jobs:
  test-linux:
    name: Test on Linux
    runs-on: ubuntu-latest
    env:
      IT_OPENSEARCH_URL: ${{ secrets.IT_OPENSEARCH_URL }}
      IT_AWS_REGION: ${{ secrets.IT_AWS_REGION }}
      IT_AWS_ACCESS_KEY_ID: ${{ secrets.IT_AWS_ACCESS_KEY_ID }}
      IT_AWS_SECRET_ACCESS_KEY: ${{ secrets.IT_AWS_SECRET_ACCESS_KEY }}
      IT_AWS_SESSION_TOKEN: ${{ secrets.IT_AWS_SESSION_TOKEN }}
      IT_BASIC_AUTH_USERNAME: ${{ secrets.IT_BASIC_AUTH_USERNAME }}
      IT_BASIC_AUTH_PASSWORD: ${{ secrets.IT_BASIC_AUTH_PASSWORD }}
      IT_IAM_ROLE_ARN: ${{ secrets.IT_IAM_ROLE_ARN }}
      IT_TEST_INDEX: mcp-integration-test-linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install UV
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv sync

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          python -m pytest

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Verify distribution
        run: twine check dist/*

      - name: Install from tar.gz
        run: pip install dist/*.tar.gz

      - name: Show metadata (tar.gz)
        run: pip show opensearch-mcp-server-py

      - name: Uninstall tar.gz package
        run: pip uninstall -y opensearch-mcp-server-py

      - name: Install from wheel
        run: pip install dist/*.whl

      - name: Show metadata (wheel)
        run: pip show opensearch-mcp-server-py

      - name: Install integration test dependencies
        run: pip install pytest-asyncio pytest-timeout "httpx[http2]"

      - name: Run integration tests
        run: python -m pytest integration_tests/ -v --tb=short --timeout=180

  test-macos:
    name: Test on macOS
    runs-on: macOS-latest
    env:
      IT_OPENSEARCH_URL: ${{ secrets.IT_OPENSEARCH_URL }}
      IT_AWS_REGION: ${{ secrets.IT_AWS_REGION }}
      IT_AWS_ACCESS_KEY_ID: ${{ secrets.IT_AWS_ACCESS_KEY_ID }}
      IT_AWS_SECRET_ACCESS_KEY: ${{ secrets.IT_AWS_SECRET_ACCESS_KEY }}
      IT_AWS_SESSION_TOKEN: ${{ secrets.IT_AWS_SESSION_TOKEN }}
      IT_BASIC_AUTH_USERNAME: ${{ secrets.IT_BASIC_AUTH_USERNAME }}
      IT_BASIC_AUTH_PASSWORD: ${{ secrets.IT_BASIC_AUTH_PASSWORD }}
      IT_IAM_ROLE_ARN: ${{ secrets.IT_IAM_ROLE_ARN }}
      IT_TEST_INDEX: mcp-integration-test-macos

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install UV
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv sync

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          python -m pytest

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Verify distribution
        run: twine check dist/*

      - name: Install from tar.gz
        run: pip install dist/*.tar.gz

      - name: Show metadata (tar.gz)
        run: pip show opensearch-mcp-server-py

      - name: Uninstall tar.gz package
        run: pip uninstall -y opensearch-mcp-server-py

      - name: Install from wheel
        run: pip install dist/*.whl

      - name: Show metadata (wheel)
        run: pip show opensearch-mcp-server-py

      - name: Install integration test dependencies
        run: pip install pytest-asyncio pytest-timeout "httpx[http2]"

      - name: Run integration tests
        run: python -m pytest integration_tests/ -v --tb=short --timeout=180

  test-windows:
    name: Test on Windows
    runs-on: windows-latest
    env:
      IT_OPENSEARCH_URL: ${{ secrets.IT_OPENSEARCH_URL }}
      IT_AWS_REGION: ${{ secrets.IT_AWS_REGION }}
      IT_AWS_ACCESS_KEY_ID: ${{ secrets.IT_AWS_ACCESS_KEY_ID }}
      IT_AWS_SECRET_ACCESS_KEY: ${{ secrets.IT_AWS_SECRET_ACCESS_KEY }}
      IT_AWS_SESSION_TOKEN: ${{ secrets.IT_AWS_SESSION_TOKEN }}
      IT_BASIC_AUTH_USERNAME: ${{ secrets.IT_BASIC_AUTH_USERNAME }}
      IT_BASIC_AUTH_PASSWORD: ${{ secrets.IT_BASIC_AUTH_PASSWORD }}
      IT_IAM_ROLE_ARN: ${{ secrets.IT_IAM_ROLE_ARN }}
      IT_TEST_INDEX: mcp-integration-test-windows

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install UV
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        shell: pwsh
        run: |
          uv venv
          .\.venv\Scripts\Activate.ps1
          uv sync

      - name: Run unit tests
        shell: pwsh
        run: |
          .\.venv\Scripts\Activate.ps1
          python -m pytest

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Verify distribution
        run: twine check dist/*

      - name: Install from tar.gz
        shell: pwsh
        run: |
          $tarball = Get-ChildItem dist/*.tar.gz | Select-Object -First 1
          pip install $tarball.FullName

      - name: Show metadata (tar.gz)
        run: pip show opensearch-mcp-server-py

      - name: Uninstall tar.gz package
        run: pip uninstall -y opensearch-mcp-server-py

      - name: Install from wheel
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          pip install $wheel.FullName

      - name: Show metadata (wheel)
        run: pip show opensearch-mcp-server-py

      - name: Install integration test dependencies
        run: pip install pytest-asyncio pytest-timeout "httpx[http2]"

      - name: Run integration tests
        run: python -m pytest integration_tests/ -v --tb=short --timeout=180
