apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch-mcp-server
  namespace: log-correlation
  labels:
    app.kubernetes.io/name: opensearch-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opensearch-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensearch-mcp-server
    spec:
      containers:
        - name: opensearch-mcp-server
          image: docker.io/shubh457/log-correlation:v1
          command: ["python", "-c", "from mcp_server_opensearch import main; import sys; sys.argv = ['mcp', '--transport', 'stream', '--mode', 'single', '--host', '0.0.0.0', '--port', '9900']; main()"]
          ports:
            - containerPort: 9900
              protocol: TCP
          env:
            - name: OPENSEARCH_URL
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: OPENSEARCH_URL
            - name: OPENSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: OPENSEARCH_USERNAME
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: OPENSEARCH_PASSWORD
            - name: OPENSEARCH_SSL_VERIFY
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: OPENSEARCH_SSL_VERIFY
          readinessProbe:
            httpGet:
              path: /health
              port: 9900
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9900
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
