apiVersion: v1
kind: Secret
metadata:
  name: opensearch-credentials
  namespace: log-correlation
  labels:
    app.kubernetes.io/name: log-correlation
type: Opaque
stringData:
  OPENSEARCH_URL: "REPLACE_ME"
  OPENSEARCH_USERNAME: "REPLACE_ME"
  OPENSEARCH_PASSWORD: "REPLACE_ME"
  OPENSEARCH_SSL_VERIFY: "false"
