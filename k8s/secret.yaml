#   kubectl -n log-correlation create secret generic opensearch-credentials \
#     --from-literal=OPENSEARCH_URL=https://app-opensearch-dev.interface.ai \
#     --from-literal=OPENSEARCH_USERNAME=support-user \
#     --from-literal=OPENSEARCH_PASSWORD='<password>' \
#     --from-literal=OPENSEARCH_SSL_VERIFY=false
